#cloud-config
# Claude Cowork appliance — first-boot bootstrap for a VPS/mini-PC.
#
# Before use, replace the two placeholders:
#   __HOSTNAME__   public hostname (e.g. claude.example.com)
#   __ADMIN_KEY__  the admin's SSH public key
#
# What this does: creates the first member account, clones the repo,
# and runs appliance/setup.sh. Interactive steps (cloudflared tunnel
# login, Access policy, Claude sign-in) remain manual by design —
# they involve credentials that don't belong in user-data. The
# first-boot README on the box lists them.
#
# Spec: docs/cowork-appliance-phases.md (Phase 5)

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - ca-certificates

users:
  - name: cowork
    shell: /bin/bash
    groups: [users]
    lock_passwd: true
  - name: admin
    shell: /bin/bash
    groups: [sudo]
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    lock_passwd: true
    ssh_authorized_keys:
      - __ADMIN_KEY__

write_files:
  - path: /etc/motd
    append: true
    content: |
      ── Claude Cowork appliance ──────────────────────────────
      Provisioned by cloud-init. Remaining manual steps:
        1. cloudflared tunnel login && cloudflared tunnel create
        2. finish /etc/cloudflared/config.yml, route DNS, install svc
        3. add a Cloudflare Access policy for __HOSTNAME__
        4. open the session in a browser, sign into Claude
        5. sudo /opt/claude-appliance/appliance/setup.sh doctor
      Runbook: /opt/claude-appliance/docs/cowork-appliance-runbook.md

runcmd:
  - git clone --depth 1
    https://github.com/aaddrick/claude-desktop-debian
    /opt/claude-appliance
  - /opt/claude-appliance/appliance/setup.sh
    --user cowork --hostname __HOSTNAME__
  - /opt/claude-appliance/appliance/setup.sh doctor --user cowork
    || true
